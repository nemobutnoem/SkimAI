spring:
  application:
    name: researchco-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/researchco}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:researchco-secret-key-change-me-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
