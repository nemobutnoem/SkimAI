    seed-keywords: ${HOME_LIVE_TRENDS_SEEDS:Market Research=consumer demand|market signals|category growth;Mobility & Consumer=Electric bike|Urban mobility|EV commute;Commerce & Platforms=TikTok Shop trends|Social Commerce|Creator commerce;Food & Lifestyle=Pho|Vietnamese street food|Quick noodle recipes}
