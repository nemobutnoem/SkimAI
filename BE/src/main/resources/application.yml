spring:
  application:
    name: researchco-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&preferQueryMode=simple&prepareThreshold=0}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.kbxulunixssiykelahpz}
    password: ${SPRING_DATASOURCE_PASSWORD:Nguyenhoang@0712}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:84486682480-d2n9j94neqp1stuti5i4of7koont41hq.apps.googleusercontent.com}
  jwt:
    secret: ${JWT_SECRET:dev-only-local-secret-must-change-in-production-min32}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  payment:
    test-mode: ${PAYMENT_TEST_MODE:false}
    bank:
      id: ${PAYMENT_BANK_ID:MB}
      account-no: ${PAYMENT_BANK_ACCOUNT_NO:0868222999}
      account-name: ${PAYMENT_BANK_ACCOUNT_NAME:SKIMAI LABS}
    momo:
      phone: ${PAYMENT_MOMO_PHONE:0868222999}
      account-name: ${PAYMENT_MOMO_ACCOUNT_NAME:SKIMAI LABS}

integration:
  serpapi:
    api-key: ${SERPAPI_API_KEY:}
    google-max-results: ${SERPAPI_GOOGLE_MAX_RESULTS:5}
    news-max-results: ${SERPAPI_NEWS_MAX_RESULTS:5}
  stripe:
