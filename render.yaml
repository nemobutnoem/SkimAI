services:
  - type: web
    name: skimai-backend
    env: java
    plan: free
    rootDir: BE
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/researchco-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/home/trends
    autoDeploy: true
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: FRONTEND_BASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_MAX_RESULTS
        value: "5"
      - key: HOME_LIVE_TRENDS_REFRESH_MS
        value: "3600000"
