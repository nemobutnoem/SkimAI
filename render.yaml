services:
  - type: web
    name: skimai-backend
    runtime: docker
    plan: free
    dockerfilePath: ./BE/Dockerfile
    healthCheckPath: /api/home/trends
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: FRONTEND_BASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_MAX_RESULTS
        value: "5"
      - key: HOME_LIVE_TRENDS_REFRESH_MS
        value: "3600000"
